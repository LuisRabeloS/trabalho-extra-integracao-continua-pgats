# CI de nível 01 - Disparo manual através de clique

#nome da pipeline
name: 'Execução manual - self hosted'

# gatilhos/triggers - regras de disparo
# gatilho manual - workflow_dispatch
on:
  workflow_dispatch:

# tarefas dentro da pipeline
jobs:
  #nome do job
  e2e-tests:
    #maquina onde o job vai rodar
    runs-on: self-hosted
    #passos do job
    steps:
      #clone do projeto
      - uses: actions/checkout@v4

      #instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      #instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn   

      #instalação das dependências
      - name: Instalando dependências
        run: yarn

      #instalaçãa dos browsers do playwright
      - name: Intalando browsers do playwright
        run: yarn playwright install

      #executar os testes e2e
      - name: Executando os testes e2e
        run: yarn run e2e     

  notify-failure:
  name: Notificar falha no Telegram
  needs: e2e-tests
  if: failure()
  runs-on: ubuntu-latest  
  steps:
    - name: Telegram Notify
      uses: appleboy/telegram-action@v1.0.1
      with: 
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        format: markdown
        message: |
          🚨 Pipeline Falhou
          *Repositório:* ${{ github.repository }}
          *Branch:* ${{ github.ref_name }}
          *Autor:* ${{ github.actor }}
          *Workflow:* ${{ github.workflow }}
          🔗 Ver detalhes:
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}